services:
  - type: web
    name: aibi-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python ml_pipeline.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "postgresql://user:password@hostname:5432/dbname" # Reemplazar en el dashboard de Render
      - key: SECRET_KEY
        generateValue: true
